services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alnadara
      POSTGRES_PASSWORD: alnadara
      POSTGRES_DB: alnadara
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alnadara -d alnadara"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgres://alnadara:alnadara@db:5432/alnadara
      ALLOWED_ORIGINS: http://localhost:3000
      INTERNAL_API_KEY: dev
      SECRET_KEY: dev-secret-not-for-prod
      # COD Network (mock in dev — set a real key in EasyPanel)
      CODNETWORK_API_BASE: https://api.codnetwork.com
      CODNETWORK_API_KEY: mock
      CODNETWORK_BRAND_ID: ""
      CODNETWORK_MODE: lead
      CODNETWORK_WEBHOOK_SECRET: dev
      # Tracking — empty in dev
      META_PIXEL_ID: ""
      META_CAPI_ACCESS_TOKEN: ""
      META_TEST_EVENT_CODE: ""
      TIKTOK_PIXEL_ID: ""
      TIKTOK_CAPI_ACCESS_TOKEN: ""
      SNAP_PIXEL_ID: ""
      SNAP_CAPI_ACCESS_TOKEN: ""
      SHEETS_WEBHOOK_URL: ""
      SHEETS_WEBHOOK_SECRET: dev
      WHATSAPP_SUPPORT_NUMBER: "+96550001234"
      SUPPORT_EMAIL: support@alnadara.shop
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_META_PIXEL_ID: ""
        NEXT_PUBLIC_TIKTOK_PIXEL_ID: ""
        NEXT_PUBLIC_SNAP_PIXEL_ID: ""
        NEXT_PUBLIC_WHATSAPP_NUMBER: "+96550001234"
        NEXT_PUBLIC_SUPPORT_EMAIL: support@alnadara.shop
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WHATSAPP_NUMBER: "+96550001234"
      NEXT_PUBLIC_SUPPORT_EMAIL: support@alnadara.shop
      META_CAPI_ACCESS_TOKEN: ""
      TIKTOK_CAPI_ACCESS_TOKEN: ""
      SNAP_CAPI_ACCESS_TOKEN: ""
      META_TEST_EVENT_CODE: ""
    ports:
      - "3000:3000"

volumes:
  pgdata:
